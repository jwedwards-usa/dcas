<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DCA Allocations</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #fff;
      --text: #172033;
      --muted: #667085;
      --line: #d8e0ea;
      --blue: #2563eb;
      --red: #b42318;
      --green: #067647;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    main {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      line-height: 1.1;
    }

    p { color: var(--muted); }

    .card {
      margin-top: 20px;
      padding: 18px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    form {
      display: grid;
      grid-template-columns: repeat(4, minmax(130px, 1fr)) auto;
      gap: 12px;
      align-items: end;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 650;
    }

    input, button {
      min-height: 42px;
      border-radius: 7px;
      font: inherit;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      padding: 8px 10px;
    }

    button {
      border: 0;
      padding: 9px 14px;
      background: var(--blue);
      color: #fff;
      cursor: pointer;
      font-weight: 750;
    }

    .status {
      min-height: 24px;
      margin: 14px 0;
    }

    .error {
      color: var(--red);
      font-weight: 650;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfdff;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 750;
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: 1.25rem;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
      background: #fff;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      white-space: nowrap;
    }

    th:first-child, td:first-child { text-align: left; }
    tr:last-child td { border-bottom: 0; }

    th {
      background: #f8fafc;
      color: #475467;
      font-size: 0.78rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .asset { font-weight: 800; }
    .yes { color: var(--green); font-weight: 750; }
    .empty { padding: 24px; text-align: center; color: var(--muted); }

    @media (max-width: 820px) {
      main { width: min(100% - 24px, 1080px); padding: 20px 0; }
      form, .summary { grid-template-columns: 1fr 1fr; }
      button { grid-column: 1 / -1; }
    }

    @media (max-width: 540px) {
      form, .summary { grid-template-columns: 1fr; }
      .card { padding: 14px; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Daily DCA Allocations</h1>
    <p>Allocates the daily budget by absolute delta strength from latest-dcas.json.</p>

    <section class="card" aria-label="DCA allocation calculator">
      <form id="controls">
        <label>Daily budget <input id="budget" type="number" min="0" step="0.01" value="100"></label>
        <label>Min allocation <input id="minimum" type="number" min="0" step="0.01" value="5"></label>
        <label>Round-up tolerance <input id="tolerance" type="number" min="0" step="0.01" value="0.50"></label>
        <label>Excludes <input id="excludes" type="text" value="OIL, PLTR" spellcheck="false"></label>
        <button type="submit">Refresh / Recalculate</button>
      </form>

      <p id="status" class="status">Loading latest-dcas.json...</p>

      <div class="summary" aria-label="Allocation summary">
        <div class="metric"><span>Budget</span><strong id="budgetOut">$0.00</strong></div>
        <div class="metric"><span>Allocated</span><strong id="allocatedOut">$0.00</strong></div>
        <div class="metric"><span>Kept</span><strong id="keptOut">0</strong></div>
        <div class="metric"><span>Dropped</span><strong id="droppedOut">0</strong></div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Asset</th>
              <th>Delta</th>
              <th>Score</th>
              <th>Raw Allocation</th>
              <th>Final Allocation</th>
              <th>Rounded Up</th>
            </tr>
          </thead>
          <tbody id="rows"><tr><td class="empty" colspan="6">No allocations loaded yet.</td></tr></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const els = {
      budget: $("budget"),
      minimum: $("minimum"),
      tolerance: $("tolerance"),
      excludes: $("excludes"),
      status: $("status"),
      rows: $("rows"),
      budgetOut: $("budgetOut"),
      allocatedOut: $("allocatedOut"),
      keptOut: $("keptOut"),
      droppedOut: $("droppedOut")
    };

    $("controls").addEventListener("submit", (event) => {
      event.preventDefault();
      load();
    });

    load();

    async function load() {
      try {
        setStatus("Loading latest-dcas.json...");
        const response = await fetch("./latest-dcas.json?ts=" + Date.now());
        if (!response.ok) throw new Error(`Could not load latest-dcas.json (${response.status})`);
        render(await response.json());
      } catch (error) {
        reset();
        setStatus(`Error: ${error.message}`, true);
      }
    }

    function render(data) {
      try {
        const options = readOptions();
        const rows = readRows(data);
        const result = allocate(rows, options);

        els.budgetOut.textContent = money(options.budget);
        els.allocatedOut.textContent = money(result.allocated);
        els.keptOut.textContent = String(result.kept.length);
        els.droppedOut.textContent = String(result.dropped.length);
        els.rows.innerHTML = result.kept.length ? result.kept.map(rowHtml).join("") : empty("No assets met the allocation rules.");

        const excluded = options.excludes.size ? ` Excluded: ${[...options.excludes].join(", ")}.` : "";
        setStatus(`Loaded ${rows.length} valid asset rows. Showing ${result.kept.length} allocations.${excluded}`);
      } catch (error) {
        reset();
        setStatus(`Error: ${error.message}`, true);
      }
    }

    function readOptions() {
      return {
        budget: readNumber(els.budget.value, "Daily budget"),
        minimum: readNumber(els.minimum.value, "Min allocation"),
        tolerance: readNumber(els.tolerance.value, "Round-up tolerance"),
        excludes: new Set(els.excludes.value.split(",").map((item) => item.trim().toUpperCase()).filter(Boolean))
      };
    }

    function readNumber(value, label) {
      const number = Number(value);
      if (!Number.isFinite(number) || number < 0) throw new Error(`${label} must be a non-negative number.`);
      return number;
    }

    function readRows(data) {
      const source = Array.isArray(data) ? data : data && (data.assets || data);
      if (!source || typeof source !== "object") throw new Error("Malformed JSON: expected an array or object.");

      const entries = Array.isArray(source) ? source.map((row, index) => [index, row]) : Object.entries(source);
      const rows = entries.map(([key, row]) => toRow(key, row)).filter(Boolean);
      if (!rows.length) throw new Error("No valid asset rows found.");
      return rows;
    }

    function toRow(key, row) {
      if (!row || typeof row !== "object") return null;

      const asset = pick(row, ["asset", "ticker", "symbol", "asset_symbol"]) || key;
      const delta = Number(pick(row, ["deltaVs1", "delta_vs_1", "delta", "vs", "value"]));
      if (!asset || !Number.isFinite(delta)) return null;

      return { asset: String(asset).trim().toUpperCase(), delta, score: Math.abs(delta) };
    }

    function pick(row, names) {
      for (const name of names) {
        if (row[name] !== undefined && row[name] !== null && row[name] !== "") return row[name];
      }
      return null;
    }

    function allocate(rows, options) {
      const candidates = rows.filter((row) => row.score > 0 && !options.excludes.has(row.asset));
      const scoreTotal = sum(candidates, "score");
      const all = candidates.map((row) => ({
        ...row,
        rawAllocation: scoreTotal ? options.budget * row.score / scoreTotal : 0,
        finalAllocation: 0,
        roundedUp: false
      }));

      const kept = [];
      const dropped = [];
      for (const row of all) {
        if (row.rawAllocation >= options.minimum) kept.push(row);
        else if (row.rawAllocation >= options.minimum - options.tolerance) {
          row.finalAllocation = options.minimum;
          row.roundedUp = true;
          kept.push(row);
        } else {
          dropped.push(row);
        }
      }

      const roundedTotal = sum(kept.filter((row) => row.roundedUp), "finalAllocation");
      const regular = kept.filter((row) => !row.roundedUp);
      const regularScore = sum(regular, "score");
      const remaining = Math.max(0, options.budget - roundedTotal);

      for (const row of regular) {
        row.finalAllocation = regularScore ? remaining * row.score / regularScore : 0;
      }

      kept.sort((a, b) => b.finalAllocation - a.finalAllocation || a.asset.localeCompare(b.asset));
      return { kept, dropped, allocated: sum(kept, "finalAllocation") };
    }

    function rowHtml(row) {
      return `<tr>
        <td class="asset">${escapeHtml(row.asset)}</td>
        <td>${num(row.delta)}</td>
        <td>${num(row.score)}</td>
        <td>${money(row.rawAllocation)}</td>
        <td>${money(row.finalAllocation)}</td>
        <td class="${row.roundedUp ? "yes" : ""}">${row.roundedUp ? "Yes" : "No"}</td>
      </tr>`;
    }

    function reset() {
      els.budgetOut.textContent = money(0);
      els.allocatedOut.textContent = money(0);
      els.keptOut.textContent = "0";
      els.droppedOut.textContent = "0";
      els.rows.innerHTML = empty("No allocations available.");
    }

    function setStatus(message, isError = false) {
      els.status.textContent = message;
      els.status.classList.toggle("error", isError);
    }

    function empty(message) {
      return `<tr><td class="empty" colspan="6">${message}</td></tr>`;
    }

    function sum(rows, key) {
      return rows.reduce((total, row) => total + row[key], 0);
    }

    function money(value) {
      return (value || 0).toLocaleString("en-US", { style: "currency", currency: "USD" });
    }

    function num(value) {
      return Number(value).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 4 });
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }
  </script>
</body>
</html>
