<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DCA Allocations</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #fff;
      --text: #172033;
      --muted: #667085;
      --line: #d8e0ea;
      --blue: #2563eb;
      --red: #b42318;
      --green: #067647;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    main {
      width: min(1080px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.65rem, 4vw, 2.2rem);
      line-height: 1.1;
    }

    .card {
      margin-top: 20px;
      padding: 18px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
      align-items: end;
      margin-top: 16px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 650;
    }

    input {
      min-height: 42px;
      border-radius: 7px;
      font: inherit;
      width: 100%;
      border: 1px solid var(--line);
      padding: 8px 10px;
    }

    label.toggle {
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 8px 10px;
      background: #fff;
      color: var(--text);
    }

    label.toggle input {
      width: auto;
      min-height: 18px;
      margin: 0;
    }

    .status {
      min-height: 24px;
      margin: 14px 0;
      color: var(--muted);
    }

    .error {
      color: var(--red);
      font-weight: 650;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin: 14px 0;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfdff;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 750;
      text-transform: uppercase;
    }

    .metric strong {
      display: block;
      margin-top: 4px;
      font-size: 1.25rem;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
      background: #fff;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      white-space: nowrap;
    }

    th:first-child, td:first-child { text-align: left; }
    tr:last-child td { border-bottom: 0; }

    th {
      background: #f8fafc;
      color: #475467;
      font-size: 0.78rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .asset { font-weight: 800; }
    .green { color: var(--green); font-weight: 750; }
    .red { color: var(--red); font-weight: 750; }
    .empty { padding: 24px; text-align: center; color: var(--muted); }

    @media (max-width: 820px) {
      main { width: min(100% - 24px, 1080px); padding: 20px 0; }
      .controls, .summary { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 540px) {
      .controls, .summary { grid-template-columns: 1fr; }
      .card { padding: 14px; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Top 5 Daily DCA Allocations</h1>

    <section class="card" aria-label="DCA allocation calculator">
      <p id="status" class="status">Loading latest-dcas.json...</p>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Asset</th>
              <th>DCAS</th>
              <th>Line</th>
              <th>Color</th>
              <th>Close</th>
              <th>Score</th>
              <th>Raw Allocation</th>
              <th>Final Allocation</th>
            </tr>
          </thead>
          <tbody id="rows"><tr><td class="empty" colspan="8">No allocations loaded yet.</td></tr></tbody>
        </table>
      </div>

      <div class="summary" aria-label="Allocation summary">
        <div class="metric"><span>Budget</span><strong id="budgetOut">$0.00</strong></div>
        <div class="metric"><span>Allocated</span><strong id="allocatedOut">$0.00</strong></div>
        <div class="metric"><span>Kept</span><strong id="keptOut">0</strong></div>
        <div class="metric"><span>Dropped</span><strong id="droppedOut">0</strong></div>
      </div>

      <div id="controls" class="controls">
        <label>Daily budget <input id="budget" type="number" min="0" step="0.01" value="100"></label>
        <label>Min allocation <input id="minimum" type="number" min="0" step="0.01" value="5"></label>
        <label>Round-up tolerance <input id="tolerance" type="number" min="0" step="0.01" value="0.50"></label>
        <label>Excludes <input id="excludes" type="text" value="OIL, PLTR, MSTR, BTCUSD, USOIL" spellcheck="false"></label>
        <label>DCAS max <input id="positiveThreshold" type="number" min="0" step="0.01" value="0"></label>
        <label class="toggle">Show red <input id="showRed" type="checkbox"></label>
      </div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const els = {
      budget: $("budget"),
      minimum: $("minimum"),
      tolerance: $("tolerance"),
      excludes: $("excludes"),
      positiveThreshold: $("positiveThreshold"),
      showRed: $("showRed"),
      status: $("status"),
      rows: $("rows"),
      budgetOut: $("budgetOut"),
      allocatedOut: $("allocatedOut"),
      keptOut: $("keptOut"),
      droppedOut: $("droppedOut")
    };
    let latestData = null;

    $("controls").addEventListener("input", () => {
      if (latestData) render(latestData);
    });

    load();

    async function load() {
      try {
        setStatus("Loading latest-dcas.json...");
        const response = await fetch("./latest-dcas.json?ts=" + Date.now());
        if (!response.ok) throw new Error(`Could not load latest-dcas.json (${response.status})`);
        latestData = await response.json();
        render(latestData);
      } catch (error) {
        reset();
        setStatus(`Error: ${error.message}`, true);
      }
    }

    function render(data) {
      try {
        const options = readOptions();
        const rows = readRows(data);
        const result = allocate(rows, options);
        const generated = generatedInfo(data, rows);

        els.budgetOut.textContent = money(options.budget);
        els.allocatedOut.textContent = money(result.allocated);
        els.keptOut.textContent = String(result.kept.length);
        els.droppedOut.textContent = String(result.dropped.length + result.overflow.length);
        els.rows.innerHTML = result.visible.length ? result.visible.map(rowHtml).join("") : empty("No assets met the allocation rules.");

        const excluded = options.excludes.size ? ` Manual excludes: ${[...options.excludes].join(", ")}.` : "";
        const redMode = options.showRed ? "Red rows are shown" : "Red rows are hidden";
        setStatus(`Showing ${result.visible.length} ${generated.session} trade candidates for ${generated.date} from ${rows.length} valid asset rows. ${redMode}; DCAS max is ${num(options.dcasMax)}.${excluded}`);
      } catch (error) {
        reset();
        setStatus(`Error: ${error.message}`, true);
      }
    }

    function readOptions() {
      return {
        budget: readNumber(els.budget.value, "Daily budget"),
        minimum: readNumber(els.minimum.value, "Min allocation"),
        tolerance: readNumber(els.tolerance.value, "Round-up tolerance"),
        dcasMax: readNumber(els.positiveThreshold.value, "DCAS max"),
        showRed: els.showRed.checked,
        excludes: new Set(els.excludes.value.split(",").map((item) => item.trim().toUpperCase()).filter(Boolean))
      };
    }

    function readNumber(value, label) {
      const number = Number(value);
      if (!Number.isFinite(number) || number < 0) throw new Error(`${label} must be a non-negative number.`);
      return number;
    }

    function readRows(data) {
      const source = Array.isArray(data) ? data : data && (data.assets || data);
      if (!source || typeof source !== "object") throw new Error("Malformed JSON: expected an array or object.");

      const entries = Array.isArray(source) ? source.map((row, index) => [index, row]) : Object.entries(source);
      const rows = entries.map(([key, row]) => toRow(key, row)).filter(Boolean);
      if (!rows.length) throw new Error("No valid asset rows found.");
      return rows;
    }

    function toRow(key, row) {
      if (!row || typeof row !== "object") return null;

      const asset = pick(row, ["asset", "ticker", "symbol", "asset_symbol"]) || key;
      const dcasValue = Number(pick(row, ["dcasValue", "dcas_value", "value"]));
      if (!asset || !Number.isFinite(dcasValue)) return null;
      const lineSide = String(pick(row, ["lineSide", "dcas_side", "line_side"]) || (dcasValue < 0 ? "below" : dcasValue > 0 ? "above" : "on")).toLowerCase();
      const visualColor = String(pick(row, ["visualColor", "dcas_visual_color", "color"]) || "unknown").toLowerCase();
      const closePrice = Number(pick(row, ["lastDecodedDailyCandleClosePrice", "last_decoded_daily_candle_close_price"]));

      return {
        asset: String(asset).trim().toUpperCase(),
        dcasValue,
        lineSide,
        visualColor,
        closePrice: Number.isFinite(closePrice) ? closePrice : null,
        score: dcasValue < 0 ? Math.abs(dcasValue) : 0,
        updatedAt: pick(row, ["updated_at_utc", "updatedAt", "updated_at"]),
        capturedAt: pick(row, ["captured_at_utc", "capturedAt", "captured_at"])
      };
    }

    function pick(row, names) {
      for (const name of names) {
        if (row[name] !== undefined && row[name] !== null && row[name] !== "") return row[name];
      }
      return null;
    }

    function allocate(rows, options) {
      const candidates = rows
        .filter((row) => isEligible(row, options))
        .map((row) => ({ ...row, score: scoreFor(row, options) }))
        .filter((row) => row.score > 0)
        .sort(byDcasThenAsset);
      const top = candidates.slice(0, 5);
      const overflow = candidates.slice(5).map((row) => ({
        ...row,
        rawAllocation: 0,
        finalAllocation: 0,
        roundedUp: false
      }));
      const scoreTotal = sum(top, "score");
      const all = top.map((row) => ({
        ...row,
        rawAllocation: scoreTotal ? options.budget * row.score / scoreTotal : 0,
        finalAllocation: 0,
        roundedUp: false
      }));

      const kept = [];
      const dropped = [];
      for (const row of all) {
        if (row.rawAllocation >= options.minimum) kept.push(row);
        else if (row.rawAllocation >= options.minimum - options.tolerance) {
          row.finalAllocation = options.minimum;
          row.roundedUp = true;
          kept.push(row);
        } else {
          dropped.push(row);
        }
      }

      const roundedTotal = sum(kept.filter((row) => row.roundedUp), "finalAllocation");
      const regular = kept.filter((row) => !row.roundedUp);
      const regularScore = sum(regular, "score");
      const remaining = Math.max(0, options.budget - roundedTotal);

      for (const row of regular) {
        row.finalAllocation = regularScore ? remaining * row.score / regularScore : 0;
      }

      kept.sort(byDcasThenAsset);
      const visible = [...kept, ...dropped, ...overflow].sort(byDcasThenAsset);
      return { kept, dropped, overflow, visible, allocated: sum(kept, "finalAllocation") };
    }

    function byDcasThenAsset(a, b) {
      return a.dcasValue - b.dcasValue || a.asset.localeCompare(b.asset);
    }

    function isEligible(row, options) {
      if (options.excludes.has(row.asset)) return false;
      if (!options.showRed && row.visualColor === "red") return false;
      return row.dcasValue <= options.dcasMax;
    }

    function scoreFor(row, options) {
      return Math.max(0, options.dcasMax - row.dcasValue);
    }

    function generatedInfo(data, rows) {
      const timestamp = data.last_run_time_utc || newestTimestamp(rows);
      const date = timestamp ? new Date(timestamp) : null;
      if (!date || Number.isNaN(date.getTime())) return { session: "daily", date: "unknown date" };

      return {
        session: date.getHours() < 12 ? "morning" : "evening",
        date: date.toLocaleDateString(undefined, { month: "short", day: "numeric", year: "numeric" })
      };
    }

    function newestTimestamp(rows) {
      const timestamps = rows
        .map((row) => row.updatedAt || row.capturedAt)
        .map((value) => value && new Date(value))
        .filter((date) => date && !Number.isNaN(date.getTime()))
        .sort((a, b) => b - a);
      return timestamps[0] && timestamps[0].toISOString();
    }

    function rowHtml(row) {
      return `<tr>
        <td class="asset">${escapeHtml(row.asset)}</td>
        <td>${num(row.dcasValue)}</td>
        <td>${escapeHtml(row.lineSide)}</td>
        <td class="${row.visualColor === "green" ? "green" : row.visualColor === "red" ? "red" : ""}">${escapeHtml(row.visualColor)}</td>
        <td>${row.closePrice === null ? "" : num(row.closePrice)}</td>
        <td>${num(row.score)}</td>
        <td>${money(row.rawAllocation)}</td>
        <td>${money(row.finalAllocation)}</td>
      </tr>`;
    }

    function reset() {
      els.budgetOut.textContent = money(0);
      els.allocatedOut.textContent = money(0);
      els.keptOut.textContent = "0";
      els.droppedOut.textContent = "0";
      els.rows.innerHTML = empty("No allocations available.");
    }

    function setStatus(message, isError = false) {
      els.status.textContent = message;
      els.status.classList.toggle("error", isError);
    }

    function empty(message) {
      return `<tr><td class="empty" colspan="8">${message}</td></tr>`;
    }

    function sum(rows, key) {
      return rows.reduce((total, row) => total + row[key], 0);
    }

    function money(value) {
      return (value || 0).toLocaleString("en-US", { style: "currency", currency: "USD" });
    }

    function num(value) {
      return Number(value).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 4 });
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }
  </script>
</body>
</html>
