<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DCA Allocations</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --panel: #ffffff;
      --text: #18202f;
      --muted: #64748b;
      --line: #d9e0ea;
      --accent: #2563eb;
      --accent-dark: #1d4ed8;
      --danger: #b42318;
      --ok: #047857;
      --shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.45;
    }

    main {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.75rem, 4vw, 2.6rem);
      line-height: 1.08;
    }

    .subhead {
      margin: 8px 0 0;
      color: var(--muted);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(4, minmax(140px, 1fr)) auto;
      gap: 14px;
      align-items: end;
      margin-bottom: 18px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 0.86rem;
      font-weight: 650;
    }

    input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--text);
      background: #fff;
      font: inherit;
      padding: 9px 10px;
    }

    input:focus {
      border-color: var(--accent);
      outline: 3px solid rgba(37, 99, 235, 0.16);
    }

    button {
      min-height: 42px;
      border: 0;
      border-radius: 7px;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-weight: 750;
      padding: 10px 16px;
    }

    button:hover {
      background: var(--accent-dark);
    }

    .status {
      min-height: 24px;
      margin: 0 0 14px;
      color: var(--muted);
    }

    .status.error {
      color: var(--danger);
      font-weight: 650;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfdff;
    }

    .metric span {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .metric strong {
      display: block;
      margin-top: 5px;
      font-size: 1.35rem;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 820px;
      background: #fff;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      padding: 11px 12px;
      text-align: right;
      white-space: nowrap;
    }

    th:first-child,
    td:first-child {
      text-align: left;
    }

    th {
      background: #f8fafc;
      color: #475569;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    .asset {
      font-weight: 800;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 72px;
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 0.78rem;
      font-weight: 750;
    }

    .tag.yes {
      color: var(--ok);
      background: #dff8ec;
    }

    .tag.no {
      color: #475569;
      background: #eef2f7;
    }

    .empty {
      padding: 28px 14px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 860px) {
      main {
        width: min(100% - 24px, 1120px);
        padding: 20px 0;
      }

      header {
        display: block;
      }

      .controls,
      .summary {
        grid-template-columns: 1fr 1fr;
      }

      .controls button {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 560px) {
      .controls,
      .summary {
        grid-template-columns: 1fr;
      }

      .panel {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>Daily DCA Allocations</h1>
        <p class="subhead">Allocates the daily budget by absolute delta strength from latest-dcas.json.</p>
      </div>
    </header>

    <section class="panel" aria-label="DCA allocation calculator">
      <form class="controls" id="controls">
        <label>
          Daily budget
          <input id="budget" type="number" min="0" step="0.01" value="100">
        </label>
        <label>
          Min allocation
          <input id="minimum" type="number" min="0" step="0.01" value="5">
        </label>
        <label>
          Round-up tolerance
          <input id="tolerance" type="number" min="0" step="0.01" value="0.50">
        </label>
        <label>
          Excludes
          <input id="excludes" type="text" value="OIL, PLTR" spellcheck="false">
        </label>
        <button type="submit">Refresh / Recalculate</button>
      </form>

      <p class="status" id="status">Loading latest-dcas.json...</p>

      <div class="summary" aria-label="Allocation summary">
        <div class="metric">
          <span>Budget</span>
          <strong id="summaryBudget">$0.00</strong>
        </div>
        <div class="metric">
          <span>Allocated</span>
          <strong id="summaryAllocated">$0.00</strong>
        </div>
        <div class="metric">
          <span>Kept</span>
          <strong id="summaryKept">0</strong>
        </div>
        <div class="metric">
          <span>Dropped</span>
          <strong id="summaryDropped">0</strong>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Asset</th>
              <th>Delta</th>
              <th>Score</th>
              <th>Raw Allocation</th>
              <th>Final Allocation</th>
              <th>Rounded Up</th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr>
              <td class="empty" colspan="6">No allocations loaded yet.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const state = {
      data: null
    };

    const fields = {
      budget: document.getElementById("budget"),
      minimum: document.getElementById("minimum"),
      tolerance: document.getElementById("tolerance"),
      excludes: document.getElementById("excludes"),
      status: document.getElementById("status"),
      rows: document.getElementById("rows"),
      summaryBudget: document.getElementById("summaryBudget"),
      summaryAllocated: document.getElementById("summaryAllocated"),
      summaryKept: document.getElementById("summaryKept"),
      summaryDropped: document.getElementById("summaryDropped")
    };

    document.getElementById("controls").addEventListener("submit", async (event) => {
      event.preventDefault();
      await loadAndRender();
    });

    loadAndRender();

    async function loadAndRender() {
      setStatus("Loading latest-dcas.json...");

      try {
        const response = await fetch("./latest-dcas.json?ts=" + Date.now());
        if (!response.ok) {
          throw new Error(`Could not load latest-dcas.json (${response.status} ${response.statusText})`);
        }

        state.data = await response.json();
        render();
      } catch (error) {
        state.data = null;
        clearTable();
        setStatus(`Error: ${error.message}`, true);
      }
    }

    function render() {
      try {
        const options = readOptions();
        const rows = normalizeRows(state.data);
        const result = calculateAllocations(rows, options);

        renderSummary(result, options);
        renderRows(result.kept);

        const excludedText = options.excludes.size ? ` Excluded: ${Array.from(options.excludes).join(", ")}.` : "";
        setStatus(`Loaded ${rows.length} valid asset rows. Showing ${result.kept.length} allocations.${excludedText}`);
      } catch (error) {
        clearTable();
        setStatus(`Error: ${error.message}`, true);
      }
    }

    function readOptions() {
      const budget = readMoney(fields.budget.value, "Daily budget");
      const minimum = readMoney(fields.minimum.value, "Min allocation");
      const tolerance = readMoney(fields.tolerance.value, "Round-up tolerance");
      const excludes = new Set(
        fields.excludes.value
          .split(",")
          .map((value) => value.trim().toUpperCase())
          .filter(Boolean)
      );

      return { budget, minimum, tolerance, excludes };
    }

    function readMoney(value, label) {
      const number = Number(value);
      if (!Number.isFinite(number) || number < 0) {
        throw new Error(`${label} must be a non-negative number.`);
      }
      return number;
    }

    function normalizeRows(data) {
      const source = Array.isArray(data) ? data : data && (data.assets || data);
      if (!source || (typeof source !== "object" && !Array.isArray(source))) {
        throw new Error("Malformed JSON: expected an array or an assets object.");
      }

      const entries = Array.isArray(source) ? source.map((row, index) => [String(index), row]) : Object.entries(source);
      const rows = entries
        .map(([key, row]) => normalizeRow(key, row))
        .filter(Boolean);

      if (!rows.length) {
        throw new Error("No valid asset rows found.");
      }

      return rows;
    }

    function normalizeRow(key, row) {
      if (!row || typeof row !== "object") {
        return null;
      }

      const asset = firstValue(row, ["asset", "ticker", "symbol", "asset_symbol"]) || key;
      const delta = Number(firstValue(row, ["deltaVs1", "delta_vs_1", "delta", "vs", "value"]));

      if (!asset || !Number.isFinite(delta)) {
        return null;
      }

      return {
        asset: String(asset).trim().toUpperCase(),
        delta,
        score: Math.abs(delta)
      };
    }

    function firstValue(row, names) {
      for (const name of names) {
        if (row[name] !== undefined && row[name] !== null && row[name] !== "") {
          return row[name];
        }
      }
      return null;
    }

    function calculateAllocations(rows, options) {
      const candidates = rows
        .filter((row) => !options.excludes.has(row.asset))
        .filter((row) => row.score > 0);

      const totalScore = sum(candidates, "score");
      const withRaw = candidates.map((row) => ({
        ...row,
        rawAllocation: totalScore ? options.budget * row.score / totalScore : 0,
        finalAllocation: 0,
        roundedUp: false
      }));

      const kept = [];
      const dropped = [];

      for (const row of withRaw) {
        if (row.rawAllocation >= options.minimum) {
          kept.push(row);
        } else if (row.rawAllocation >= options.minimum - options.tolerance) {
          row.finalAllocation = options.minimum;
          row.roundedUp = true;
          kept.push(row);
        } else {
          dropped.push(row);
        }
      }

      const roundedTotal = sum(kept.filter((row) => row.roundedUp), "finalAllocation");
      const nonRounded = kept.filter((row) => !row.roundedUp);
      const remainingBudget = Math.max(0, options.budget - roundedTotal);
      const nonRoundedScore = sum(nonRounded, "score");

      for (const row of nonRounded) {
        row.finalAllocation = nonRoundedScore ? remainingBudget * row.score / nonRoundedScore : 0;
      }

      kept.sort((a, b) => b.finalAllocation - a.finalAllocation || a.asset.localeCompare(b.asset));

      return {
        kept,
        dropped,
        filtered: candidates.length,
        allocated: sum(kept, "finalAllocation")
      };
    }

    function sum(rows, key) {
      return rows.reduce((total, row) => total + row[key], 0);
    }

    function renderSummary(result, options) {
      fields.summaryBudget.textContent = money(options.budget);
      fields.summaryAllocated.textContent = money(result.allocated);
      fields.summaryKept.textContent = String(result.kept.length);
      fields.summaryDropped.textContent = String(result.dropped.length);
    }

    function renderRows(rows) {
      if (!rows.length) {
        fields.rows.innerHTML = `<tr><td class="empty" colspan="6">No assets met the allocation rules.</td></tr>`;
        return;
      }

      fields.rows.innerHTML = rows.map((row) => `
        <tr>
          <td class="asset">${escapeHtml(row.asset)}</td>
          <td>${formatNumber(row.delta)}</td>
          <td>${formatNumber(row.score)}</td>
          <td>${money(row.rawAllocation)}</td>
          <td>${money(row.finalAllocation)}</td>
          <td><span class="tag ${row.roundedUp ? "yes" : "no"}">${row.roundedUp ? "Yes" : "No"}</span></td>
        </tr>
      `).join("");
    }

    function clearTable() {
      renderSummary({ kept: [], dropped: [], allocated: 0 }, { budget: 0 });
      fields.rows.innerHTML = `<tr><td class="empty" colspan="6">No allocations available.</td></tr>`;
    }

    function setStatus(message, isError = false) {
      fields.status.textContent = message;
      fields.status.classList.toggle("error", isError);
    }

    function money(value) {
      return new Intl.NumberFormat("en-US", {
        style: "currency",
        currency: "USD",
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      }).format(value || 0);
    }

    function formatNumber(value) {
      return Number(value).toLocaleString("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 4
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
